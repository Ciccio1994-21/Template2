<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automobili Premium - Piacere di Guidare</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel per JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .clip-path-header { clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); }
        .clip-path-nav { clip-path: polygon(7% 0, 100% 0, 100% 100%, 0 100%); }
        .hero-gradient { background: linear-gradient(to bottom, rgba(26, 34, 38, 0.7) 0%, rgba(26, 34, 38, 0.2) 50%, rgba(26, 34, 38, 0.9) 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [currentPage, setCurrentPage] = useState('Home');
            const [searchQuery, setSearchQuery] = useState("");
            const [brandFilter, setBrandFilter] = useState("Tutte");
            
            // Nuove voci di menu aggiornate
            const menuItems = [
                'Home', 
                'Il nostro usato', 
                'Vendi la tua auto', 
                'Chi Siamo', 
                'Contatti'
            ];

            // Dati per la sezione "Il nostro usato"
            const inventoryCars = [
                { id: 1, name: "Audi A6 Avant", brand: "Audi", description: "Station wagon elegante e spaziosa con pacchetto S-Line.", image: "https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?auto=format&fit=crop&q=80&w=800", year: "2019", transmission: "Autom.", mileage: "45k km", price: "€ 38.500" },
                { id: 2, name: "Jaguar F-Type", brand: "Jaguar", description: "Coupé sportiva dal sound inconfondibile, interni in pelle premium.", image: "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=800", year: "2018", transmission: "Autom.", mileage: "32k km", price: "€ 45.000" },
                { id: 3, name: "BMW M3 Competition", brand: "BMW", description: "Prestazioni estreme e dinamica di guida ai vertici della categoria.", image: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=800", year: "2021", transmission: "Autom.", mileage: "15k km", price: "€ 85.000" },
                { id: 4, name: "Porsche 911 Carrera", brand: "Porsche", description: "L'icona delle auto sportive. Perfetta in ogni dettaglio.", image: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=800", year: "2020", transmission: "Autom.", mileage: "22k km", price: "€ 110.000" },
                { id: 5, name: "Mercedes Classe G", brand: "Mercedes", description: "Il fuoristrada per eccellenza, lusso e inarrestabilità.", image: "https://images.unsplash.com/photo-1520031441872-265e4ff70366?auto=format&fit=crop&q=80&w=800", year: "2022", transmission: "Autom.", mileage: "10k km", price: "€ 165.000" },
                { id: 6, name: "Audi RS3", brand: "Audi", description: "Compatta ma potentissima, trazione Quattro e motore 5 cilindri.", image: "https://images.unsplash.com/photo-1606152421802-db97b9c7a11b?auto=format&fit=crop&q=80&w=800", year: "2021", transmission: "Autom.", mileage: "18k km", price: "€ 65.000" }
            ];

            const filteredInventory = inventoryCars.filter(car => {
                const matchesSearch = car.name.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesBrand = brandFilter === "Tutte" || car.brand === brandFilter;
                return matchesSearch && matchesBrand;
            });

            return (
                <div className="min-h-screen bg-white flex flex-col">
                    {/* BARRA SUPERIORE */}
                    <div className="hidden lg:flex bg-[#1a2226] text-white py-2 px-10 justify-between items-center text-[11px] font-medium tracking-wide border-b border-white/5">
                        <div className="flex gap-4">
                            <span className="bg-[#ebbf40] text-[#222d32] px-2 py-0.5 rounded font-bold">Novità</span>
                            <span className="opacity-70 uppercase">Mettiti al volante e goditi il viaggio con noi</span>
                        </div>
                        <div className="flex gap-6 opacity-70">
                            <span>Tel: +1 123 456 7890</span>
                            <span className="border-l border-white/20 pl-6">Email: contatti@automobile.it</span>
                        </div>
                    </div>

                    {/* HEADER PRINCIPALE DESKTOP */}
                    <header className="hidden lg:block relative w-full h-[120px] bg-white z-50">
                        <div className="absolute inset-0 pointer-events-none">
                            <div className="absolute top-0 left-0 w-[45%] h-[75px] bg-[#222d32] clip-path-header"></div>
                            <div className="absolute bottom-0 left-0 w-full h-[45px] bg-[#222d32] clip-path-nav"></div>
                        </div>
                        <div className="relative z-10 max-w-[1440px] mx-auto h-full flex flex-col">
                            <div className="flex h-[75px] items-center px-10">
                                <div className="w-[30%] flex items-center text-white">
                                    <Icon name="car" size={32} className="mr-3 text-[#ebbf40]" />
                                    <span className="text-2xl font-black uppercase tracking-tighter">Automobili</span>
                                </div>
                                <div className="w-[70%] flex justify-end items-center gap-10">
                                    <div className="flex items-center gap-4 group cursor-pointer">
                                        <div className="bg-gray-100 p-2 rounded-full group-hover:bg-[#ebbf40] transition-colors"><Icon name="phone" size={16} /></div>
                                        <div className="flex flex-col text-[12px]"><span className="text-gray-400 font-bold uppercase text-[9px]">Telefono</span><span className="font-bold">+1 123 456 7890</span></div>
                                    </div>
                                    <div className="flex items-center gap-4 group cursor-pointer">
                                        <div className="bg-gray-100 p-2 rounded-full group-hover:bg-[#ebbf40] transition-colors"><Icon name="mail" size={16} /></div>
                                        <div className="flex flex-col text-[12px]"><span className="text-gray-400 font-bold uppercase text-[9px]">Email</span><span className="font-bold">info@automobile.it</span></div>
                                    </div>
                                </div>
                            </div>
                            <div className="flex h-[45px] items-center justify-between px-10 text-white ml-[5%]">
                                <nav className="flex gap-8 text-[12px] font-bold uppercase tracking-widest">
                                    {menuItems.map(item => (
                                        <a key={item} href="#" onClick={(e) => { e.preventDefault(); setCurrentPage(item); }} className={`hover:text-[#ebbf40] transition-colors whitespace-nowrap ${currentPage === item ? 'text-[#ebbf40] border-b-2 border-[#ebbf40] py-1' : ''}`}>{item}</a>
                                    ))}
                                </nav>
                                <div className="flex items-center gap-6">
                                    <Icon name="search" size={18} className="cursor-pointer hover:text-[#ebbf40]" />
                                    <button className="border border-white/30 rounded-full px-6 py-1 text-[11px] font-bold hover:bg-white hover:text-black transition-all uppercase">Test Drive</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* HEADER MOBILE */}
                    <div className="lg:hidden flex justify-between items-center p-4 bg-[#222d32] text-white sticky top-0 z-[100]">
                        <div className="flex items-center">
                            <Icon name="car" size={24} className="mr-2 text-[#ebbf40]" />
                            <span className="font-black uppercase tracking-tighter text-lg">Automobili</span>
                        </div>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2">
                            <Icon name={isMobileMenuOpen ? "x" : "menu"} />
                        </button>
                    </div>

                    {isMobileMenuOpen && (
                        <div className="lg:hidden fixed inset-0 z-[90] bg-[#222d32] pt-24 px-8 text-white flex flex-col gap-6 overflow-y-auto">
                            {menuItems.map(item => <a key={item} href="#" onClick={(e) => { e.preventDefault(); setCurrentPage(item); setIsMobileMenuOpen(false); }} className={`text-2xl font-bold uppercase tracking-widest border-b border-white/10 pb-3 ${currentPage === item ? 'text-[#ebbf40]' : ''}`}>{item}</a>)}
                        </div>
                    )}

                    <main className="flex-grow">
                        {currentPage === 'Home' && (
                            <>
                                {/* SEZIONE HERO CLEAN */}
                                <section className="relative h-[85vh] lg:h-[90vh] min-h-[600px] flex items-center justify-center overflow-hidden bg-[#1a2226]">
                                    <div className="absolute inset-0">
                                        <img 
                                            src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=2000" 
                                            alt="Auto Sportiva di Lusso" 
                                            className="w-full h-full object-cover object-center transform scale-110 lg:scale-100" 
                                        />
                                        <div className="absolute inset-0 hero-gradient"></div>
                                    </div>

                                    <div className="container mx-auto px-6 relative z-20 flex flex-col items-center text-center">
                                        <div className="max-w-4xl">
                                            <h1 className="text-white text-5xl lg:text-8xl font-black uppercase mb-4 tracking-tighter leading-[0.9] drop-shadow-2xl">
                                                Esplora l'auto <br/> dei tuoi sogni
                                            </h1>
                                            <div className="flex items-center justify-center gap-4 mb-6">
                                                <div className="h-[2px] w-12 bg-[#ebbf40]"></div>
                                                <Icon name="car" className="text-[#ebbf40]" size={20} />
                                                <div className="h-[2px] w-12 bg-[#ebbf40]"></div>
                                            </div>
                                            <p className="text-gray-200 text-sm lg:text-lg font-medium max-w-2xl mx-auto drop-shadow-md mb-10">
                                                Il nostro standard di eccellenza garantisce solo i migliori veicoli selezionati per te. 
                                                Potenza pura e design senza tempo.
                                            </p>
                                            <button className="bg-[#ebbf40] text-[#222d32] px-12 py-4 rounded-full font-black uppercase tracking-widest text-[13px] hover:bg-white transition-all shadow-xl hover:scale-105 active:scale-95">
                                                Scopri la collezione
                                            </button>
                                        </div>
                                    </div>
                                </section>

                                {/* CARATTERISTICHE SERVIZIO */}
                                <section className="py-20 bg-white">
                                    <div className="container mx-auto px-6 lg:px-20">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                                            <div className="flex flex-col items-center group">
                                                <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-6 group-hover:bg-[#ebbf40] transition-all border border-gray-100">
                                                    <Icon name="users" size={32} className="text-[#222d32]" />
                                                </div>
                                                <h3 className="text-xl font-black uppercase mb-3">Staff Qualificato</h3>
                                                <p className="text-gray-500 text-sm leading-relaxed">Esperti pronti a guidarti in ogni fase dell'acquisto con trasparenza e competenza.</p>
                                            </div>
                                            <div className="flex flex-col items-center group">
                                                <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-6 group-hover:bg-[#ebbf40] transition-all border border-gray-100">
                                                    <Icon name="clock" size={32} className="text-[#222d32]" />
                                                </div>
                                                <h3 className="text-xl font-black uppercase mb-3">Servizio Rapido</h3>
                                                <p className="text-gray-500 text-sm leading-relaxed">Ottimizziamo i tempi burocratici per farti salire a bordo della tua nuova auto il prima possibile.</p>
                                            </div>
                                            <div className="flex flex-col items-center group">
                                                <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-6 group-hover:bg-[#ebbf40] transition-all border border-gray-100">
                                                    <Icon name="phone-call" size={32} className="text-[#222d32]" />
                                                </div>
                                                <h3 className="text-xl font-black uppercase mb-3">Supporto 24/7</h3>
                                                <p className="text-gray-500 text-sm leading-relaxed">Siamo sempre a tua disposizione, anche dopo la vendita, per ogni tua necessità.</p>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* AUTO IN EVIDENZA */}
                                <section className="bg-gray-50 py-24 border-t border-gray-100">
                                    <div className="container mx-auto px-6">
                                        <div className="text-center mb-16">
                                            <h2 className="text-4xl font-black uppercase tracking-tighter mb-4 text-[#222d32]">Auto in Evidenza</h2>
                                            <div className="flex justify-center items-center gap-4"><div className="h-px w-10 bg-gray-300"></div><Icon name="car" className="text-[#ebbf40]" size={20} /><div className="h-px w-10 bg-gray-300"></div></div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-7xl mx-auto">
                                            {[
                                                { name: "Silver Audi", img: "https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?auto=format&fit=crop&q=80&w=800" },
                                                { name: "Black Jaguar", img: "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=800" },
                                                { name: "Blue BMW", img: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=800" }
                                            ].map((car, idx) => (
                                                <div key={idx} className="bg-white rounded-2xl shadow-xl overflow-hidden group hover:-translate-y-3 transition-all duration-500 border border-gray-100">
                                                    <div className="h-56 overflow-hidden relative">
                                                        <img src={car.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={car.name} />
                                                        <div className="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black uppercase text-[#222d32]">Disponibile</div>
                                                    </div>
                                                    <div className="p-8">
                                                        <div className="flex items-center gap-3 mb-4">
                                                            <div className="w-1.5 h-6 bg-[#ebbf40] rounded-full"></div>
                                                            <h3 className="text-lg font-black uppercase text-[#222d32]">{car.name}</h3>
                                                        </div>
                                                        <p className="text-gray-400 text-sm mb-8 leading-relaxed">Prestazioni eccellenti unite a un comfort di classe superiore. Un'esperienza di guida senza compromessi.</p>
                                                        <div className="grid grid-cols-3 bg-gray-50 rounded-xl overflow-hidden divide-x divide-gray-200">
                                                            <div className="py-4 text-center"><p className="text-[11px] font-black uppercase">2017</p></div>
                                                            <div className="py-4 text-center"><p className="text-[11px] font-black uppercase">Autom.</p></div>
                                                            <div className="py-4 text-center"><p className="text-[11px] font-black uppercase">21k km</p></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>
                            </>
                        )}

                        {currentPage === 'Il nostro usato' && (
                            <section className="bg-gray-50 pb-24 min-h-screen">
                                {/* HEADER INVENTARIO */}
                                <div className="bg-[#1a2226] py-20 px-6 text-center relative overflow-hidden">
                                    <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'url("https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=2000")', backgroundSize: 'cover', backgroundPosition: 'center' }}></div>
                                    <div className="relative z-10 max-w-3xl mx-auto">
                                        <h1 className="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white mb-4">Il Nostro Usato</h1>
                                        <div className="flex items-center justify-center gap-4 mb-6">
                                            <div className="h-[2px] w-12 bg-[#ebbf40]"></div>
                                            <Icon name="car" className="text-[#ebbf40]" size={20} />
                                            <div className="h-[2px] w-12 bg-[#ebbf40]"></div>
                                        </div>
                                        <p className="text-gray-400 font-medium">Scegli tra la nostra selezione di auto usate e garantite. Qualità e affidabilità al tuo servizio.</p>
                                    </div>
                                </div>

                                <div className="max-w-[1200px] mx-auto px-6 -mt-8 relative z-20">
                                    {/* BARRA DEI FILTRI */}
                                    <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col md:flex-row gap-6 items-center border border-gray-100 mb-12">
                                        <div className="w-full md:w-1/2 relative">
                                            <Icon name="search" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" />
                                            <input 
                                                type="text" 
                                                placeholder="Cerca modello o parola chiave..." 
                                                className="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-12 pr-4 text-sm focus:outline-none focus:border-[#ebbf40] focus:ring-1 focus:ring-[#ebbf40] transition-all"
                                                value={searchQuery}
                                                onChange={e => setSearchQuery(e.target.value)}
                                            />
                                        </div>
                                        <div className="w-full md:w-1/4">
                                            <select 
                                                className="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-4 text-sm focus:outline-none focus:border-[#ebbf40] focus:ring-1 focus:ring-[#ebbf40] transition-all appearance-none"
                                                value={brandFilter}
                                                onChange={e => setBrandFilter(e.target.value)}
                                            >
                                                <option value="Tutte">Tutte le Marche</option>
                                                <option value="Audi">Audi</option>
                                                <option value="BMW">BMW</option>
                                                <option value="Jaguar">Jaguar</option>
                                                <option value="Mercedes">Mercedes</option>
                                                <option value="Porsche">Porsche</option>
                                            </select>
                                        </div>
                                        <div className="w-full md:w-1/4 text-center text-sm font-bold text-gray-500 uppercase tracking-widest">
                                            {filteredInventory.length} Veicoli trovati
                                        </div>
                                    </div>

                                    {/* GRIGLIA VEICOLI */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {filteredInventory.length > 0 ? filteredInventory.map((car) => (
                                            <div key={car.id} className="bg-white rounded-2xl shadow-lg overflow-hidden group hover:-translate-y-2 transition-all duration-500 border border-gray-100 flex flex-col">
                                                <div className="h-56 overflow-hidden relative">
                                                    <img src={car.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={car.name} />
                                                    <div className="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black uppercase text-[#222d32]">Pronta Consegna</div>
                                                </div>
                                                <div className="p-8 flex flex-col flex-grow">
                                                    <div className="flex items-center gap-3 mb-4">
                                                        <div className="w-1.5 h-6 bg-[#ebbf40] rounded-full"></div>
                                                        <h3 className="text-lg font-black uppercase text-[#222d32]">{car.name}</h3>
                                                    </div>
                                                    <p className="text-gray-400 text-sm mb-6 flex-grow leading-relaxed">{car.description}</p>
                                                    <div className="text-2xl font-black text-[#222d32] mb-6 tracking-tighter">{car.price}</div>
                                                    <div className="grid grid-cols-3 bg-gray-50 rounded-xl overflow-hidden divide-x divide-gray-200 mb-6">
                                                        <div className="py-3 text-center"><p className="text-[10px] font-black uppercase">{car.year}</p></div>
                                                        <div className="py-3 text-center"><p className="text-[10px] font-black uppercase">{car.transmission}</p></div>
                                                        <div className="py-3 text-center"><p className="text-[10px] font-black uppercase">{car.mileage}</p></div>
                                                    </div>
                                                    <button className="w-full bg-[#222d32] text-white py-3 rounded-xl font-bold uppercase tracking-widest text-[11px] hover:bg-[#ebbf40] hover:text-[#222d32] transition-colors shadow-md">
                                                        Richiedi Info
                                                    </button>
                                                </div>
                                            </div>
                                        )) : (
                                            <div className="col-span-full py-20 text-center text-gray-400">
                                                <Icon name="search-x" size={48} className="mx-auto mb-4 opacity-30" />
                                                <h3 className="text-xl font-black uppercase tracking-tighter text-[#222d32] mb-2">Nessun veicolo trovato</h3>
                                                <p>Prova a modificare i parametri di ricerca o i filtri.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </section>
                        )}

                        {currentPage !== 'Home' && currentPage !== 'Il nostro usato' && (
                            <section className="bg-gray-50 py-32 text-center min-h-[60vh] flex flex-col justify-center items-center">
                                <Icon name="wrench" size={64} className="text-[#ebbf40] mb-6" />
                                <h1 className="text-4xl font-black uppercase text-[#222d32] mb-4">Sezione in costruzione</h1>
                                <p className="text-gray-500 max-w-md mx-auto">La pagina "{currentPage}" sarà presto disponibile. Stiamo lavorando per offrirti nuovi contenuti.</p>
                            </section>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-[#1a2226] text-white">
                        <div className="container mx-auto px-6 lg:px-20 pt-20 pb-10">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-16 mb-20">
                                <div className="flex flex-col gap-6">
                                    <div className="flex items-center text-white">
                                        <Icon name="car" size={36} className="mr-3 text-[#ebbf40]" />
                                        <span className="text-3xl font-black uppercase tracking-tighter">Automobili</span>
                                    </div>
                                    <p className="text-gray-400 text-sm leading-relaxed font-medium">
                                        Dal 1990 selezioniamo solo il meglio del mercato automobilistico internazionale. La tua soddisfazione è il nostro motore.
                                    </p>
                                    {/* SOCIAL LOGOS */}
                                    <div className="flex gap-4 mt-2">
                                        <a href="#" className="group">
                                            <div className="w-12 h-12 rounded-xl border border-white/10 flex items-center justify-center hover:bg-[#ebbf40] transition-all bg-white/5 overflow-hidden p-2">
                                                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook" className="w-full h-full object-contain group-hover:brightness-0" />
                                            </div>
                                        </a>
                                        <a href="#" className="group">
                                            <div className="w-12 h-12 rounded-xl border border-white/10 flex items-center justify-center hover:bg-[#ebbf40] transition-all bg-white/5 overflow-hidden p-2">
                                                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram" className="w-full h-full object-contain group-hover:brightness-0 group-hover:grayscale" />
                                            </div>
                                        </a>
                                    </div>
                                </div>

                                <div>
                                    <h4 className="text-xl font-black uppercase mb-10 tracking-tighter flex items-center gap-3">
                                        <div className="w-1.5 h-5 bg-[#ebbf40]"></div> Link Rapidi
                                    </h4>
                                    <ul className="flex flex-col gap-5 text-gray-400 text-[13px] font-bold uppercase tracking-widest">
                                        {/* Link aggiornati nel footer */}
                                        {menuItems.map(item => (

                                <div>

                                    <ul className="flex flex-col gap-4 text-gray-400 text-sm">

                                        <li className="flex justify-between border-b border-white/5 pb-3"><span>Sabato:</span> <span className="text-white font-bold">09:30 - 18:00</span></li>
                                        <li className="flex justify-between text-gray-500"><span>Domenica:</span> <span>Chiuso</span></li>
                                    </ul>
                                </div>

                                <div>
                                    <h4 className="text-xl font-black uppercase mb-10 tracking-tighter flex items-center gap-3">
                                        <div className="w-1.5 h-5 bg-[#ebbf40]"></div> Newsletter
                                    </h4>
                                    <p className="text-gray-400 text-sm mb-6 leading-relaxed">Iscriviti per ricevere le ultime novità sui nuovi arrivi in concessionaria.</p>
                                    <div className="relative">
                                        <input 
                                            type="email" 
                                            placeholder="Email..." 
                                            className="w-full bg-[#222d32] border border-white/10 rounded-xl py-4 pl-6 pr-14 text-sm focus:outline-none focus:border-[#ebbf40] transition-all"
                                        />
                                        <button className="absolute right-2 top-2 bottom-2 bg-[#ebbf40] text-[#222d32] rounded-lg px-3 flex items-center justify-center hover:bg-white transition-all">
                                            <Icon name="send" size={18} />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="border-t border-white/5 pt-12 text-center">
                                <p className="text-gray-500 text-[11px] uppercase font-bold tracking-[0.3em]">
                                    © 2024 Automobili Premium Dealer. Eccellenza in Movimento.
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
