<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ox Dealer Auto</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Sovrascriviamo il rosso con il giallo/ambra del brand Ox Dealer
                        red: { 50: '#fefce8', 100: '#fef9c3', 500: '#eab308', 600: '#eab308', 700: '#ca8a04' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; min-height: 100vh; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
        }
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: white; z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .social-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .social-link:hover .social-icon-img {
            transform: scale(1.15);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-600"></div>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Caricamento...</p>
        </div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // CONFIGURAZIONE DEL TEMPLATE
        // Modifica questi valori per adattare il sito 
        // a una nuova concessionaria
        // ==========================================
        const CONFIG = {
            // Dati Generali
            nomeConcessionaria: "Ox Dealer", // Es: Max Car
            citta: "Livorno", // Es: Tivoli
            provinciaBreve: "LI",
            provinciaEstesa: "Livorno, Toscana",
            cap: "57100",
            
            // Testi Homepage
            sottotitoloHero: "Vendita auto usate, furgoni e mezzi agricoli. Veicoli selezionati e garantiti.",
            descrizioneFooter: "Specialisti in compravendita di autovetture, veicoli commerciali e mezzi agricoli a Livorno.",
            
            // Contatti
            indirizzo: "Via dell'Artigianato",
            telefonoMostrato: "+39 333 123 4567",
            telefonoLink: "+393331234567", // Senza spazi per il link tel:
            whatsappNumber: "393331234567", // Per il link wa.me
            email: "dealerservice.ox@gmail.com",
            
            // Social e Link Esterni
            social: {
                instagram: "https://www.instagram.com/ox_.dealer?igsh=MXcwNXZ3ZGM2bnpx",
                facebook: "https://www.facebook.com/share/1H5sQuiXGK/?mibextid=wwXIfr"
            },
            linkGoogleFormValutazione: "https://docs.google.com/forms/d/e/1FAIpQLSeYtcqgrOejvWqClIlEUneC2LPtTNzf67413H_mxFtcnGdnbw/viewform?embedded=true",
            
            // Sezione "Chi Siamo"
            chiSiamo: {
                titoloOrigini: "La Passione per i Motori",
                paragrafo1: "Ox Dealer nasce dalla mia più grande passione fin da quando ero bambino: i motori. Ho iniziato facendo piccoli lavoretti, sistemando la carrozzeria e la meccanica, fino a diventare un meccatronico specializzato.",
                paragrafo2: "La vendita di veicoli per me non è solo un lavoro, ma una vera vocazione. Dopo aver iniziato tre anni fa affiancando mio padre, ho deciso di aprire la mia attività. Sono giovane, di origini marocchine, e ho una grandissima voglia di dimostrare le mie capacità garantendo personalmente ogni veicolo che propongo.",
                citazione: "La meccanica non ha segreti per me. Seleziono e controllo personalmente ogni auto, furgone o mezzo agricolo, perché la vostra sicurezza è la mia priorità assoluta.",
                nomeFondatore: "Ossama El Filahi",
                ruoloFondatore: "Titolare & Meccatronico",
                inizialeFondatore: "O"
            },

            // Database Firebase
            firebase: {
                apiKey: "AIzaSyCB5yV6u4DtzUFb0jADUJobh8In52JNzp4",
                authDomain: "maxcar-7416d.firebaseapp.com",
                projectId: "maxcar-7416d",
                storageBucket: "maxcar-7416d.firebasestorage.app",
                messagingSenderId: "279232212865",
                appId: "1:279232212865:web:b3efed853a2f3057bb4280",
                measurementId: "G-5NW557LHKR"
            },
            // L'ID del database per scaricare le auto
            dbAppId: "ox-dealer-demo" 
        };

        if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebase);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const COLLECTION_PATH = `artifacts/${CONFIG.dbAppId}/public/data/automobili`;

        const IG_ICON = "https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg";
        const FB_ICON = "https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg";

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedCar, setSelectedCar] = useState(null);
            const [autoList, setAutoList] = useState([]);
            const [filter, setFilter] = useState('Tutti');
            const [loading, setLoading] = useState(true);
            const [activeImage, setActiveImage] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            // Aggiorna il titolo del documento dinamicamente
            useEffect(() => {
                document.title = `${CONFIG.nomeConcessionaria} | ${CONFIG.citta}`;
            }, []);

            useEffect(() => {
                const init = async () => {
                    try {
                        await auth.signInAnonymously();
                        const unsubscribe = db.collection(COLLECTION_PATH)
                            .orderBy('createdAt', 'desc')
                            .onSnapshot(snapshot => {
                                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                // Imposta solo i dati reali provenienti dal database
                                setAutoList(data);
                                setLoading(false);
                                const loader = document.getElementById('loader');
                                if (loader) loader.style.opacity = '0';
                                setTimeout(() => { if (loader) loader.style.display = 'none'; }, 500);
                            }, (err) => {
                                console.error("Errore database:", err);
                                setAutoList([]);
                                setLoading(false);
                            });
                        return () => unsubscribe();
                    } catch (error) {
                        console.error("Errore Auth:", error);
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [currentPage, autoList, filter, selectedCar, isMobileMenuOpen]);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [currentPage, selectedCar]);

            const openCarDetails = (car) => {
                setSelectedCar(car);
                setActiveImage(car.immagine);
                setCurrentPage('prodotto');
            };

            const carImages = useMemo(() => {
                if (!selectedCar) return [];
                const images = [selectedCar.immagine];
                if (selectedCar.galleria && Array.isArray(selectedCar.galleria)) {
                    selectedCar.galleria.forEach(img => {
                        if (img !== selectedCar.immagine) images.push(img);
                    });
                }
                return images;
            }, [selectedCar]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 overflow-x-hidden w-full">
                    <nav className="bg-white/95 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 shadow-sm w-full">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setCurrentPage('home'); setSelectedCar(null); setIsMobileMenuOpen(false); }}>
                                {/* LOGO: Ricreato tipograficamente in stile con l'originale */}
                                <div className="flex items-center">
                                    <span className="font-black text-4xl tracking-tighter text-slate-900">ox</span>
                                    <span className="font-medium text-4xl italic tracking-tight text-slate-900" style={{ fontFamily: 'Georgia, serif' }}>dealer.</span>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest text-slate-500">
                                <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'home' ? 'text-red-600' : ''}`}>Home</button>
                                <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'piazzale' ? 'text-red-600' : ''}`}>Piazzale</button>
                                <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'vendi' ? 'text-red-600' : ''}`}>Vendi Auto</button>
                                <button onClick={() => { setCurrentPage('chisiamo'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'chisiamo' ? 'text-red-600' : ''}`}>Chi Siamo</button>
                                <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); }} className={`hover:text-red-600 transition ${currentPage === 'contatti' ? 'text-red-600' : ''}`}>Contatti</button>
                            </div>

                            <button className="md:hidden text-slate-900 focus:outline-none p-2" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                <i data-lucide={isMobileMenuOpen ? "x" : "menu"} className="w-6 h-6"></i>
                            </button>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="md:hidden absolute top-full left-0 w-full bg-white border-b shadow-2xl flex flex-col py-6 px-8 gap-6 text-sm font-bold uppercase tracking-widest text-slate-600 animate-in slide-in-from-top-2 duration-300">
                                <button onClick={() => { setCurrentPage('home'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'home' ? 'text-red-600' : ''}`}>Home</button>
                                <button onClick={() => { setCurrentPage('piazzale'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'piazzale' ? 'text-red-600' : ''}`}>Piazzale</button>
                                <button onClick={() => { setCurrentPage('vendi'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'vendi' ? 'text-red-600' : ''}`}>Vendi Auto</button>
                                <button onClick={() => { setCurrentPage('chisiamo'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'chisiamo' ? 'text-red-600' : ''}`}>Chi Siamo</button>
                                <button onClick={() => { setCurrentPage('contatti'); setSelectedCar(null); setIsMobileMenuOpen(false); }} className={`text-left hover:text-red-600 transition ${currentPage === 'contatti' ? 'text-red-600' : ''}`}>Contatti</button>
                            </div>
                        )}
                    </nav>

                    <main className="flex-grow w-full">
                        {currentPage === 'home' && (
                            <>
                                <div className="hero-bg min-h-[80vh] flex items-center justify-center text-center text-white px-4">
                                    <div className="max-w-3xl animate-in fade-in slide-in-from-bottom-10 duration-1000">
                                        <h1 className="text-6xl md:text-8xl font-extrabold uppercase italic tracking-tighter mb-6">{CONFIG.nomeConcessionaria} <span className="text-red-600">{CONFIG.citta}</span></h1>
                                        <p className="text-xl md:text-2xl font-light mb-10 text-slate-200">{CONFIG.sottotitoloHero}</p>
                                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                                            <button onClick={() => setCurrentPage('piazzale')} className="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-xl font-bold uppercase transition shadow-2xl hover:scale-105 transform text-slate-900">Esplora il Piazzale</button>
                                            <a href={`tel:${CONFIG.telefonoLink}`} className="bg-white/10 hover:bg-white/20 backdrop-blur-md px-12 py-5 rounded-xl font-bold uppercase transition border border-white/20">Chiama Ora</a>
                                        </div>
                                    </div>
                                </div>
                                <div className="py-20 px-6 bg-white border-y">
                                    <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12">
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="shield-check" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Garantiti & Certificati</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Ogni veicolo viene meticolosamente controllato e certificato direttamente da Ossama, forte della sua esperienza come meccatronico.</p>
                                        </div>
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="coins" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Finanziamenti Personalizzati</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Offriamo soluzioni di pagamento su misura per agevolare l'acquisto del tuo nuovo veicolo o mezzo da lavoro in totale serenità.</p>
                                        </div>
                                        <div className="flex flex-col items-center text-center">
                                            <div className="w-16 h-16 bg-red-50 text-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><i data-lucide="globe-2" className="w-8 h-8"></i></div>
                                            <h3 className="font-black uppercase italic text-xl mb-3">Servizio Import/Export</h3>
                                            <p className="text-slate-500 text-sm leading-relaxed">Specializzati non solo nella vendita locale, ma anche in servizi di importazione ed esportazione di auto, furgoni e mezzi agricoli.</p>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                        
                        {(currentPage === 'home' || currentPage === 'piazzale') && (
                            <div className="py-16 px-6 max-w-7xl mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 border-b pb-8">
                                    <h2 className="text-4xl font-black uppercase italic tracking-tight">Vetrina <span className="text-red-600 underline">Occasioni</span></h2>
                                    <div className="flex gap-2 bg-white p-1 rounded-full shadow-sm border overflow-x-auto max-w-full">
                                        {['Tutti', 'Auto', 'Furgoni', 'Mezzi Agricoli'].map(c => (
                                            <button key={c} onClick={() => setFilter(c)} className={`whitespace-nowrap px-4 md:px-6 py-2 rounded-full text-[10px] font-bold uppercase transition ${filter === c ? 'bg-red-600 text-slate-900 shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>{c}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                    {autoList.filter(a => filter === 'Tutti' || a.categoria === filter).length === 0 && !loading && (
                                        <div className="col-span-full text-center py-20 bg-slate-50 rounded-[2rem] border border-slate-100">
                                            <i data-lucide="car-front" className="w-12 h-12 mx-auto text-slate-300 mb-4"></i>
                                            <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">Nessun veicolo disponibile al momento.</p>
                                        </div>
                                    )}
                                    {autoList.filter(a => filter === 'Tutti' || a.categoria === filter).map(car => (
                                        <div key={car.id} onClick={() => openCarDetails(car)} className="bg-white rounded-[2rem] overflow-hidden shadow-xl hover:shadow-2xl transition duration-500 border border-slate-100 group cursor-pointer">
                                            <div className="h-64 overflow-hidden relative">
                                                <img src={car.immagine} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" alt={car.modello} />
                                                <div className="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black text-slate-900 shadow-sm uppercase tracking-widest">{car.categoria}</div>
                                                <div className="absolute bottom-4 right-4 bg-red-600 text-white px-4 py-2 rounded-2xl font-black text-xl shadow-lg">€{Number(car.prezzo)?.toLocaleString()}</div>
                                            </div>
                                            <div className="p-8">
                                                <h3 className="font-black uppercase text-2xl mb-1 tracking-tighter text-slate-900 leading-none">{car.marca}</h3>
                                                <p className="text-red-600 font-bold uppercase text-sm mb-4">{car.modello}</p>
                                                <div className="flex items-center gap-4 text-slate-400 text-[10px] font-bold uppercase border-t pt-4">
                                                    <span className="flex items-center gap-1"><i data-lucide="calendar" className="w-3 h-3"></i> {car.anno}</span>
                                                    <span className="flex items-center gap-1"><i data-lucide="gauge" className="w-3 h-3"></i> {Number(car.km)?.toLocaleString()} KM</span>
                                                    <span className="flex items-center gap-1"><i data-lucide="fuel" className="w-3 h-3"></i> {car.alimentazione}</span>
                                                </div>
                                                <button className="w-full mt-8 bg-slate-900 text-white py-4 rounded-xl font-bold text-[11px] uppercase tracking-widest group-hover:bg-red-600 transition duration-300">Visualizza Dettagli</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentPage === 'prodotto' && selectedCar && (
                            <div className="py-12 px-6 max-w-7xl mx-auto animate-in fade-in duration-500">
                                <button onClick={() => setCurrentPage('piazzale')} className="flex items-center gap-2 text-slate-500 font-bold uppercase text-xs mb-8 hover:text-red-600 transition">
                                    <i data-lucide="arrow-left" className="w-4 h-4"></i> Torna al piazzale
                                </button>
                                
                                <div className="grid lg:grid-cols-2 gap-12 mb-16">
                                    <div className="space-y-4 overflow-hidden w-full max-w-full">
                                        <div className="rounded-[2.5rem] overflow-hidden shadow-2xl bg-white border border-slate-100 aspect-video relative">
                                            <img src={activeImage} alt={selectedCar.modello} className="w-full h-full object-cover transition-opacity duration-300" />
                                        </div>
                                        {carImages.length > 1 && (
                                            <div className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
                                                {carImages.map((img, idx) => (
                                                    <div 
                                                        key={idx} 
                                                        onClick={() => setActiveImage(img)}
                                                        className={`flex-shrink-0 w-24 h-24 rounded-2xl overflow-hidden cursor-pointer border-4 transition ${activeImage === img ? 'border-red-600 shadow-lg' : 'border-white opacity-70 hover:opacity-100'}`}
                                                    >
                                                        <img src={img} className="w-full h-full object-cover" />
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex flex-col overflow-hidden w-full max-w-full">
                                        <span className="bg-red-100 text-red-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest w-fit mb-4">{selectedCar.categoria}</span>
                                        <h1 className="text-5xl font-black uppercase italic tracking-tighter text-slate-900 leading-none mb-2 break-words">{selectedCar.marca}</h1>
                                        <p className="text-2xl text-red-600 font-bold uppercase mb-6 break-words">{selectedCar.modello}</p>
                                        <div className="text-4xl font-black text-slate-900 mb-8 italic">€ {Number(selectedCar.prezzo)?.toLocaleString()}</div>
                                        
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center text-center">
                                                <i data-lucide="calendar" className="w-4 h-4 text-red-600 mb-2"></i>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Anno</p>
                                                <p className="font-black text-md text-slate-900">{selectedCar.anno}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center text-center">
                                                <i data-lucide="gauge" className="w-4 h-4 text-red-600 mb-2"></i>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Km</p>
                                                <p className="font-black text-md text-slate-900">{Number(selectedCar.km)?.toLocaleString()}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center text-center">
                                                <i data-lucide="fuel" className="w-4 h-4 text-red-600 mb-2"></i>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Alim.</p>
                                                <p className="font-black text-md text-slate-900 truncate w-full">{selectedCar.alimentazione}</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex flex-col items-center text-center">
                                                <i data-lucide="settings-2" className="w-4 h-4 text-red-600 mb-2"></i>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase">Cambio</p>
                                                <p className="font-black text-md text-slate-900">{selectedCar.cambio || 'Manuale'}</p>
                                            </div>
                                        </div>

                                        <div className="space-y-4 w-full">
                                            <a href={`https://wa.me/${CONFIG.whatsappNumber}?text=Buongiorno, vorrei informazioni sulla ${selectedCar.marca} ${selectedCar.modello} vista sul sito.`} target="_blank" className="w-full bg-green-500 hover:bg-green-600 text-white flex items-center justify-center gap-3 py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition shadow-lg"><i data-lucide="message-circle" className="w-5 h-5"></i>WhatsApp</a>
                                            <a href={`tel:${CONFIG.telefonoLink}`} className="w-full bg-slate-900 hover:bg-red-600 text-white flex items-center justify-center gap-3 py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition shadow-lg"><i data-lucide="phone" className="w-5 h-5"></i>Chiama Ora</a>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid lg:grid-cols-3 gap-12 border-t pt-16">
                                    <div className="lg:col-span-2 overflow-hidden max-w-full">
                                        <h3 className="text-2xl font-black uppercase italic mb-6 text-slate-900">Descrizione <span className="text-red-600">Completa</span></h3>
                                        <div className="bg-white p-6 md:p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                            <p className="text-slate-600 leading-relaxed whitespace-pre-line text-sm md:text-base break-words">
                                                {selectedCar.descrizione || "Nessuna descrizione dettagliata fornita per questo veicolo."}
                                            </p>
                                        </div>
                                    </div>
                                    <div className="space-y-8 w-full max-w-full">
                                        <h3 className="text-2xl font-black uppercase italic mb-6 text-slate-900">Scheda <span className="text-red-600">Tecnica</span></h3>
                                        <div className="bg-slate-900 text-white p-6 md:p-8 rounded-[2rem] shadow-xl w-full">
                                            <ul className="space-y-5 text-xs md:text-sm uppercase font-bold tracking-wider">
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Marca</span>
                                                    <span className="text-right ml-2">{selectedCar.marca}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Modello</span>
                                                    <span className="text-right ml-2">{selectedCar.modello}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Anno</span>
                                                    <span className="text-right ml-2">{selectedCar.anno}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Chilometri</span>
                                                    <span className="text-right ml-2">{Number(selectedCar.km)?.toLocaleString()} km</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Alimentazione</span>
                                                    <span className="text-right ml-2">{selectedCar.alimentazione}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Cambio</span>
                                                    <span className="text-right ml-2">{selectedCar.cambio || "Manuale"}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Potenza</span>
                                                    <span className="text-right ml-2">{selectedCar.potenza ? `${selectedCar.potenza} CV` : "N/D"}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Cilindrata</span>
                                                    <span className="text-right ml-2">{selectedCar.cilindrata ? `${selectedCar.cilindrata} cc` : "N/D"}</span>
                                                </li>
                                                <li className="flex justify-between border-b border-white/10 pb-2">
                                                    <span className="text-slate-400">Colore</span>
                                                    <span className="text-right ml-2">{selectedCar.colore || "N/D"}</span>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === 'contatti' && (
                            <div className="py-24 px-6 max-w-5xl mx-auto animate-in fade-in duration-700">
                                <h2 className="text-5xl font-black uppercase italic mb-16 text-center">Contattaci</h2>
                                <div className="grid md:grid-cols-2 gap-16 items-start">
                                    <div className="space-y-10">
                                        <div className="flex gap-6 items-start">
                                            <div className="bg-red-50 p-4 rounded-2xl text-red-600 shadow-sm"><i data-lucide="map-pin" className="w-6 h-6"></i></div>
                                            <div>
                                                <h4 className="font-black uppercase text-xs tracking-widest text-slate-400 mb-2">Sede Principale</h4>
                                                <p className="text-xl font-bold text-slate-900 leading-tight">{CONFIG.indirizzo}<br/>{CONFIG.cap} {CONFIG.citta} ({CONFIG.provinciaBreve})</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-6 items-start">
                                            <div className="bg-red-50 p-4 rounded-2xl text-red-600 shadow-sm"><i data-lucide="mail" className="w-6 h-6"></i></div>
                                            <div>
                                                <h4 className="font-black uppercase text-xs tracking-widest text-slate-400 mb-2">Email Ufficiale</h4>
                                                <p className="text-xl font-bold text-slate-900 break-all">{CONFIG.email}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-6 items-start">
                                            <div className="bg-red-50 p-4 rounded-2xl text-red-600 shadow-sm"><i data-lucide="phone" className="w-6 h-6"></i></div>
                                            <div>
                                                <h4 className="font-black uppercase text-xs tracking-widest text-slate-400 mb-2">Linea Diretta</h4>
                                                <p className="text-2xl font-black text-slate-900">{CONFIG.telefonoMostrato}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-xl border border-slate-100 flex flex-col items-center text-center justify-center min-h-[300px]">
                                        <h3 className="text-3xl font-black uppercase italic mb-8 text-slate-900 tracking-tighter">Social Network</h3>
                                        <div className="flex flex-col gap-4 w-full">
                                            {CONFIG.social.instagram && (
                                                <a href={CONFIG.social.instagram} target="_blank" className="bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-4 hover:bg-red-600 transition shadow-lg transform hover:-translate-y-1">
                                                    <img src={IG_ICON} className="w-5 h-5" alt="Instagram" /> Instagram
                                                </a>
                                            )}
                                            {CONFIG.social.facebook && (
                                                <a href={CONFIG.social.facebook} target="_blank" className="bg-[#1877F2] text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-4 hover:bg-blue-700 transition shadow-lg transform hover:-translate-y-1">
                                                    <img src={FB_ICON} className="w-5 h-5" alt="Facebook" /> Facebook
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === 'vendi' && (
                            <div className="py-24 px-6 max-w-5xl mx-auto animate-in fade-in duration-700">
                                <h2 className="text-5xl font-black uppercase italic mb-8 text-center">Vendi la tua <span className="text-red-600">Auto</span></h2>
                                <p className="text-center text-slate-500 font-bold mb-12 text-sm">Compila il modulo sottostante con i dati del tuo veicolo per ricevere una valutazione gratuita e senza impegno.</p>
                                <div className="bg-white p-4 md:p-8 rounded-[3rem] shadow-xl border border-slate-100 flex justify-center w-full h-[900px]">
                                    <iframe 
                                        src={CONFIG.linkGoogleFormValutazione} 
                                        width="100%" 
                                        height="100%" 
                                        frameBorder="0" 
                                        marginHeight="0" 
                                        marginWidth="0"
                                        className="rounded-2xl"
                                    >Caricamento in corso…</iframe>
                                </div>
                            </div>
                        )}

                        {currentPage === 'chisiamo' && (
                            <div className="py-24 px-6 max-w-7xl mx-auto animate-in fade-in duration-700">
                                <div className="text-center mb-16">
                                    <h2 className="text-5xl md:text-6xl font-black uppercase italic tracking-tighter text-slate-900 mb-6">Chi <span className="text-red-600">Siamo</span></h2>
                                    <p className="text-xl text-slate-500 font-bold max-w-3xl mx-auto">La passione per i motori al tuo servizio. Scopri la storia di {CONFIG.nomeConcessionaria} e il nostro impegno per garantirti sempre il meglio.</p>
                                </div>

                                <div className="grid lg:grid-cols-2 gap-16 items-center mb-24">
                                    <div className="space-y-6">
                                        <h3 className="text-3xl font-black uppercase italic text-slate-900">{CONFIG.chiSiamo.titoloOrigini}</h3>
                                        <p className="text-slate-600 leading-relaxed text-lg" dangerouslySetInnerHTML={{__html: CONFIG.chiSiamo.paragrafo1}}></p>
                                        <p className="text-slate-600 leading-relaxed text-lg" dangerouslySetInnerHTML={{__html: CONFIG.chiSiamo.paragrafo2}}></p>
                                    </div>
                                    <div className="bg-slate-900 rounded-[3rem] p-8 md:p-12 shadow-2xl text-white relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-8 opacity-10"><i data-lucide="quote" className="w-24 h-24"></i></div>
                                        <div className="relative z-10">
                                            <i data-lucide="car" className="w-12 h-12 text-red-600 mb-6"></i>
                                            <p className="text-xl md:text-2xl font-light italic leading-relaxed mb-8">
                                                "{CONFIG.chiSiamo.citazione}"
                                            </p>
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center font-black text-xl">{CONFIG.chiSiamo.inizialeFondatore}</div>
                                                <div>
                                                    <p className="font-bold uppercase tracking-widest text-xs">{CONFIG.chiSiamo.nomeFondatore}</p>
                                                    <p className="text-slate-400 text-[10px] uppercase tracking-widest">{CONFIG.chiSiamo.ruoloFondatore}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-8">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl transition duration-300">
                                        <div className="w-14 h-14 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="search-check" className="w-6 h-6"></i></div>
                                        <h4 className="text-xl font-black uppercase italic mb-3">Selezione Rigorosa</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">Ogni auto proposta viene sottoposta a minuziosi controlli e revisioni complete dai nostri esperti, per assicurarti un acquisto sereno e assolutamente senza sorprese.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl transition duration-300">
                                        <div className="w-14 h-14 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="handshake" className="w-6 h-6"></i></div>
                                        <h4 className="text-xl font-black uppercase italic mb-3">Trasparenza</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">Crediamo in un rapporto di onestà e fiducia. Nessun costo nascosto o dettaglio omesso: ti forniamo tutta la cronologia e la verità sugli interventi del veicolo.</p>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 hover:shadow-xl transition duration-300">
                                        <div className="w-14 h-14 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="shield-alert" className="w-6 h-6"></i></div>
                                        <h4 className="text-xl font-black uppercase italic mb-3">Sicurezza Garantita</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">La tua tranquillità su strada è la nostra priorità. Mettiamo a disposizione garanzie su misura e assistenza dedicata, guidandoti dall'acquisto al post-vendita.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-slate-950 text-white py-16 px-6 mt-auto">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-3 gap-12 border-b border-white/10 pb-12 mb-8">
                            <div>
                                <h4 className="font-black uppercase italic text-2xl mb-4">{CONFIG.nomeConcessionaria} <span className="text-red-600">{CONFIG.citta}</span></h4>
                                <p className="text-slate-400 text-sm leading-relaxed mb-6 italic">{CONFIG.descrizioneFooter}</p>
                                <div className="flex gap-4">
                                    {CONFIG.social.instagram && (
                                        <a href={CONFIG.social.instagram} target="_blank" className="social-link w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-white/10 hover:border-red-500/50">
                                            <img src={IG_ICON} className="social-icon-img" alt="Instagram" />
                                        </a>
                                    )}
                                    {CONFIG.social.facebook && (
                                        <a href={CONFIG.social.facebook} target="_blank" className="social-link w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-white/10 hover:border-blue-500/50">
                                            <img src={FB_ICON} className="social-icon-img" alt="Facebook" />
                                        </a>
                                    )}
                                </div>
                            </div>
                            <div className="space-y-4">
                                <h5 className="font-bold uppercase text-xs tracking-widest text-red-600">Contatti Rapidi</h5>
                                <div className="flex flex-col gap-3">
                                    <a href={`tel:${CONFIG.telefonoLink}`} className="text-slate-300 font-bold hover:text-white transition flex items-center gap-3">
                                        <div className="bg-white/5 p-2 rounded-lg"><i data-lucide="phone" className="w-4 h-4"></i></div> 
                                        {CONFIG.telefonoMostrato}
                                    </a>
                                    <a href={`mailto:${CONFIG.email}`} className="text-slate-300 font-bold hover:text-white transition flex items-center gap-3 break-all">
                                        <div className="bg-white/5 p-2 rounded-lg"><i data-lucide="mail" className="w-4 h-4"></i></div> 
                                        {CONFIG.email}
                                    </a>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <h5 className="font-bold uppercase text-xs tracking-widest text-red-600">Sede Operativa</h5>
                                <p className="text-slate-300 font-bold flex items-start gap-3">
                                    <div className="bg-white/5 p-2 rounded-lg"><i data-lucide="map-pin" className="w-4 h-4"></i></div>
                                    <span>{CONFIG.indirizzo}<br/><span className="text-slate-500 font-medium">{CONFIG.cap} {CONFIG.citta} ({CONFIG.provinciaBreve})</span></span>
                                </p>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-[10px] font-bold uppercase tracking-widest opacity-40 italic">
                            <span>&copy; {new Date().getFullYear()} {CONFIG.nomeConcessionaria} {CONFIG.citta}</span>
                            <span>{CONFIG.provinciaEstesa}</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
