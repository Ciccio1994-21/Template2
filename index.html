<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automobili Premium Dealer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel per trasformare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .menu-gradient {
            background: linear-gradient(135deg, #222d32 0%, #1a2226 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Helper per le icone Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const menuItems = [
                { label: 'Home', active: true },
                { label: 'Chi Siamo', active: false },
                { label: 'Inventario', active: false },
                { label: 'Servizi', active: false },
                { label: 'Team', active: false },
                { label: 'Contatti', active: false },
            ];

            const featuredCars = [
                {
                    id: 1,
                    name: "SILVER AUDI",
                    description: "Un'icona di eleganza e prestazioni, perfetta per chi cerca comfort e stile in ogni viaggio.",
                    image: "https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?auto=format&fit=crop&q=80&w=800",
                    year: "2017",
                    transmission: "Autom.",
                    mileage: "21k km"
                },
                {
                    id: 2,
                    name: "BLACK JAGUAR",
                    description: "Potenza pura e design senza tempo. Una vettura che non passa mai inosservata su strada.",
                    image: "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=800",
                    year: "2017",
                    transmission: "Autom.",
                    mileage: "21k km"
                },
                {
                    id: 3,
                    name: "BLUE BMW",
                    description: "Dinamismo e tecnologia all'avanguardia. L'auto ideale per il piacere di guida assoluto.",
                    image: "https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=800",
                    year: "2017",
                    transmission: "Autom.",
                    mileage: "21k km"
                }
            ];

            return (
                <div className="min-h-screen bg-white text-slate-800 antialiased flex flex-col">
                    
                    {/* HEADER DESKTOP */}
                    <header className="hidden lg:block relative w-full h-[140px] bg-white z-50 shadow-sm">
                        <div className="absolute inset-0 pointer-events-none overflow-hidden">
                            <div className="absolute top-0 left-0 w-[42%] h-[90px] bg-[#222d32]" style={{ clipPath: 'polygon(0 0, 100% 0, 85% 100%, 0 100%)' }}></div>
                            <div className="absolute bottom-0 left-0 w-full h-[50px] bg-[#222d32]" style={{ clipPath: 'polygon(7% 0, 100% 0, 100% 100%, 0 100%)' }}></div>
                        </div>
                        <div className="relative z-10 max-w-[1440px] mx-auto h-full flex flex-col">
                            <div className="flex h-[90px]">
                                <div className="w-[35%] flex items-center pl-10 text-white">
                                    <Icon name="car" size={40} className="mr-3 text-[#ebbf40]" />
                                    <div className="flex flex-col leading-tight">
                                        <span className="text-3xl font-black tracking-tighter uppercase">Automobili</span>
                                        <span className="text-[10px] tracking-[0.3em] uppercase text-[#ebbf40] font-bold">Premium Dealer</span>
                                    </div>
                                </div>
                                <div className="w-[65%] flex items-center justify-end gap-10 pr-10">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-gray-100 p-2 rounded-full"><Icon name="phone" size={16} className="text-[#222d32]" /></div>
                                        <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Chiamaci:</span><span className="text-[13px] font-bold text-gray-800">+39 012 345 6789</span></div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="bg-gray-100 p-2 rounded-full"><Icon name="clock" size={16} className="text-[#222d32]" /></div>
                                        <div className="flex flex-col"><span className="text-[10px] font-bold text-gray-400 uppercase">Orari:</span><span className="text-[13px] font-bold text-gray-800">9:00 - 19:30</span></div>
                                    </div>
                                </div>
                            </div>
                            <div className="flex h-[50px] items-center justify-between text-white px-10">
                                <nav className="flex gap-8 pl-[10%] text-[13px] font-bold uppercase tracking-widest h-full items-center">
                                    {menuItems.map((item) => (
                                        <a key={item.label} href="#" className={`transition-all duration-300 border-b-2 py-1 ${item.active ? 'text-[#ebbf40] border-[#ebbf40]' : 'border-transparent hover:text-[#ebbf40]'}`}>{item.label}</a>
                                    ))}
                                </nav>
                                <div className="flex gap-6">
                                    <Icon name="facebook" size={18} className="cursor-pointer hover:text-[#ebbf40]" />
                                    <Icon name="instagram" size={18} className="cursor-pointer hover:text-[#ebbf40]" />
                                    <Icon name="twitter" size={18} className="cursor-pointer hover:text-[#ebbf40]" />
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* HEADER MOBILE */}
                    <header className="lg:hidden bg-[#222d32] text-white p-5 flex justify-between items-center sticky top-0 z-[100] shadow-lg">
                        <div className="flex items-center">
                            <Icon name="car" size={30} className="mr-2 text-[#ebbf40]" />
                            <span className="text-xl font-black uppercase tracking-tighter">Automobili</span>
                        </div>
                        <button 
                            onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                            className="p-2 hover:bg-white/10 rounded-lg transition-colors"
                        >
                            <Icon name={isMobileMenuOpen ? "x" : "menu"} size={30} />
                        </button>
                    </header>

                    {/* MOBILE MENU OVERLAY */}
                    {isMobileMenuOpen && (
                        <div className="fixed inset-0 z-[90] lg:hidden animate-in fade-in duration-300">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)}></div>
                            <nav className="absolute top-[70px] left-0 w-full bg-[#222d32] border-t border-white/10 p-6 flex flex-col gap-4 shadow-2xl animate-in slide-in-from-top duration-300">
                                {menuItems.map((item) => (
                                    <a 
                                        key={item.label} 
                                        href="#" 
                                        className={`text-lg font-bold uppercase tracking-widest py-3 border-b border-white/5 ${item.active ? 'text-[#ebbf40]' : 'text-white'}`}
                                        onClick={() => setIsMobileMenuOpen(false)}
                                    >
                                        {item.label}
                                    </a>
                                ))}
                                <div className="flex gap-6 mt-4 pt-4 border-t border-white/10 text-[#ebbf40]">
                                    <Icon name="facebook" size={24} />
                                    <Icon name="instagram" size={24} />
                                    <Icon name="twitter" size={24} />
                                </div>
                            </nav>
                        </div>
                    )}

                    {/* MAIN CONTENT */}
                    <main className="flex-grow">
                        {/* HERO SECTION */}
                        <section className="relative h-[650px] flex items-center justify-center text-center overflow-hidden">
                            <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: 'url("https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=1920")' }}>
                                <div className="absolute inset-0 bg-black/65"></div>
                            </div>
                            <div className="relative z-10 px-6 max-w-4xl mx-auto">
                                <h2 className="text-4xl md:text-6xl font-black text-white mb-6 uppercase tracking-wider leading-tight">ESPLORA L'AUTO DEI TUOI SOGNI</h2>
                                <div className="flex items-center justify-center gap-5 my-10">
                                    <div className="h-px w-16 md:w-24 bg-white/30"></div>
                                    <Icon name="car" className="text-[#ebbf40]" size={30} />
                                    <div className="h-px w-16 md:w-24 bg-white/30"></div>
                                </div>
                                <p className="text-white text-lg font-light mb-12 max-w-2xl mx-auto leading-relaxed opacity-90">Il nostro standard di eccellenza garantisce solo i migliori veicoli selezionati per te.</p>
                                <button className="bg-[#ebbf40] text-[#222d32] px-12 py-4 rounded-[30px] font-bold uppercase tracking-widest hover:bg-white transition-all shadow-xl">SCOPRI DI PIÙ</button>
                            </div>
                        </section>

                        {/* FEATURES SECTION */}
                        <section className="py-24 bg-gray-50">
                            <div className="max-w-6xl mx-auto px-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                                    <div className="bg-white p-10 rounded-2xl shadow-sm border-b-4 border-transparent hover:border-[#ebbf40] transition-all group">
                                        <div className="w-20 h-20 rounded-full bg-[#ebbf40] flex items-center justify-center mb-8 mx-auto"><Icon name="users" size={32} /></div>
                                        <h3 className="text-xl font-black text-[#222d32] mb-5 uppercase">Staff Qualificato</h3>
                                        <p className="text-gray-500 text-sm">Esperti pronti a guidarti in ogni fase dell'acquisto.</p>
                                    </div>
                                    <div className="bg-white p-10 rounded-2xl shadow-sm border-b-4 border-transparent hover:border-[#222d32] transition-all group">
                                        <div className="w-20 h-20 rounded-full bg-[#222d32] flex items-center justify-center mb-8 mx-auto"><Icon name="clock" className="text-white" size={32} /></div>
                                        <h3 className="text-xl font-black text-[#222d32] mb-5 uppercase">Servizio Rapido</h3>
                                        <p className="text-gray-500 text-sm">Ottimizziamo i tempi burocratici per te.</p>
                                    </div>
                                    <div className="bg-white p-10 rounded-2xl shadow-sm border-b-4 border-transparent hover:border-[#222d32] transition-all group">
                                        <div className="w-20 h-20 rounded-full bg-[#222d32] flex items-center justify-center mb-8 mx-auto"><Icon name="phone" className="text-white" size={32} /></div>
                                        <h3 className="text-xl font-black text-[#222d32] mb-5 uppercase">Supporto H24</h3>
                                        <p className="text-gray-500 text-sm">Il nostro servizio clienti è attivo costantemente.</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* AUTO IN EVIDENZA - ULTIMA SEZIONE PRIMA DEL FOOTER */}
                        <section className="py-24 bg-white border-t border-gray-100">
                            <div className="max-w-[1200px] mx-auto px-6">
                                <div className="text-center mb-16">
                                    <h2 className="text-3xl font-black text-[#222d32] uppercase tracking-tight mb-4">AUTO IN EVIDENZA</h2>
                                    <div className="flex items-center justify-center gap-4 mb-6">
                                        <div className="h-[2px] w-12 bg-gray-200"></div>
                                        <Icon name="car" className="text-[#ebbf40]" size={20} />
                                        <div className="h-[2px] w-12 bg-gray-200"></div>
                                    </div>
                                    <p className="text-gray-500 text-sm max-w-2xl mx-auto">Selezione esclusiva dei nostri modelli più prestigiosi.</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {featuredCars.map((car) => (
                                        <div key={car.id} className="bg-white rounded-lg overflow-hidden shadow-[0_10px_30px_-10px_rgba(0,0,0,0.1)] group transition-all duration-500 hover:-translate-y-2 border border-gray-100">
                                            <div className="relative h-56 overflow-hidden">
                                                <img src={car.image} alt={car.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                            </div>
                                            <div className="p-8">
                                                <div className="flex items-center gap-2 mb-4">
                                                    <div className="w-1 h-6 bg-[#ebbf40]"></div>
                                                    <h3 className="text-lg font-black text-[#222d32] uppercase tracking-tighter">{car.name}</h3>
                                                </div>
                                                <p className="text-gray-400 text-xs leading-relaxed mb-8 h-12 overflow-hidden">{car.description}</p>
                                                
                                                {/* Proporzioni scritte corrette */}
                                                <div className="grid grid-cols-3 border-t border-gray-100">
                                                    <div className="py-4 px-1 text-center border-r border-gray-100 overflow-hidden">
                                                        <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Anno</p>
                                                        <p className="text-[10px] md:text-[11px] font-black text-[#222d32] truncate">{car.year}</p>
                                                    </div>
                                                    <div className="py-4 px-1 text-center border-r border-gray-100 overflow-hidden">
                                                        <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Cambio</p>
                                                        <p className="text-[10px] md:text-[11px] font-black text-[#222d32] truncate">{car.transmission}</p>
                                                    </div>
                                                    <div className="py-4 px-1 text-center overflow-hidden">
                                                        <p className="text-[9px] text-gray-400 font-bold uppercase mb-1">Km</p>
                                                        <p className="text-[10px] md:text-[11px] font-black text-[#222d32] truncate">{car.mileage}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-[#1a2226] text-white pt-16 pb-10">
                        <div className="max-w-[1400px] mx-auto px-10 text-center">
                            <div className="flex justify-center items-center mb-8">
                                <Icon name="car" size={32} className="mr-3 text-[#ebbf40]" />
                                <span className="text-2xl font-black uppercase tracking-tighter">Automobili</span>
                            </div>
                            <div className="flex justify-center gap-8 mb-10 text-gray-400">
                                <Icon name="facebook" size={20} className="hover:text-white cursor-pointer" />
                                <Icon name="instagram" size={20} className="hover:text-white cursor-pointer" />
                                <Icon name="twitter" size={20} className="hover:text-white cursor-pointer" />
                            </div>
                            <p className="text-gray-500 text-[9px] font-bold uppercase tracking-[0.3em]">© 2024 Automobili Premium Dealer. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
